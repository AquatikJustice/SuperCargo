# electron-builder configuration.
#
# Windows is built and published LOCALLY (no Actions minutes):
#
#     set GH_TOKEN=<personal access token with repo scope>   (PowerShell: $env:GH_TOKEN="...")
#     npm run publish     # installer + portable + zip, uploaded to a draft release
#     npm run dist        # same, without uploading
#
# Linux (AppImage) is built in CI on a version tag and uploaded to the same
# draft release (.github/workflows/release-linux.yml). electron-updater reads
# latest.yml / latest-linux.yml from the release assets to update both.
#
appId: space.supercargo.app
productName: SuperCargo
copyright: Copyright © 2026 Travis

directories:
  output: release
  buildResources: build

# electron-vite emits the compiled app into out/
files:
  - out/**/*
  - package.json
  # the live window/taskbar icon is loaded at runtime from ../../resources/icon.png
  # (relative to out/main); the exe + installer icon comes from build/icon.ico.
  - resources/icon.png

# Bundled UEX lists (ships, freight locations, commodities). Shipped as an offline
# seed; the app refreshes them from the repo at launch. Copied to resources/data/uex
# so dataSync.ts can read them via process.resourcesPath.
extraResources:
  - from: data/uex
    to: data/uex
    filter:
      - '*.json'

# tesseract.js loads its worker script + wasm core from disk at runtime; they
# must live outside the asar archive or recognition fails in the packaged app.
asarUnpack:
  - node_modules/tesseract.js/**
  - node_modules/tesseract.js-core/**
  # onnxruntime-node ships native .node/.dll binaries that can't run from inside asar
  - node_modules/onnxruntime-node/**

# --- Auto-update / publish target -------------------------------------------
# Update owner/repo before the first publish. electron-updater uses this to
# find latest.yml in the GitHub Release assets.
publish:
  provider: github
  owner: AquatikJustice
  repo: SuperCargo
  releaseType: draft

win:
  target:
    - target: nsis
      arch:
        - x64
    # portable: single self-contained exe, no install. zip: unpacked folder.
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: SuperCargo
  # 'always' recreates the desktop shortcut on every install AND update. Without
  # it (default true), a silent auto-update's uninstall step removes the shortcut
  # and the reinstall declines to recreate it, so the icon vanishes after updating.
  createDesktopShortcut: always
  artifactName: ${productName}-Setup-${version}.${ext}

portable:
  artifactName: ${productName}-Portable-${version}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Game
  synopsis: Star Citizen cargo hauling companion
  artifactName: ${productName}-${version}.${ext}
